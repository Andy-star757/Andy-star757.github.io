<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模组主页</title>
    <style>
        body {
            background: #1a1a2e;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
        }
        h1 { margin-bottom: 40px; font-size: 2rem; }
        .tiles {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .tile {
            width: 200px;
            height: 200px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
        }
        .tile.download { background: #27ae60; }
        .tile.join { background: #2980b9; }
        .tile.about { background: #c0392b; }
        .tile:hover { transform: scale(1.05); }
        .icon { font-size: 3rem; }

        .panel {
            display: none;
            background: #16213e;
            max-width: 600px;
            margin: 20px auto;
            padding: 30px;
            border-radius: 10px;
        }
        .panel.active { display: block; }

        .back-btn {
            padding: 10px 25px;
            background: #333;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 30px;
        }
        .btn {
            display: inline-block;
            padding: 14px 35px;
            background: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .qq-box {
            background: #0f3460;
            border: 2px dashed #2980b9;
            padding: 20px;
            font-size: 2rem;
            margin: 20px 0;
        }
        .copy-btn {
            padding: 10px 25px;
            background: #34495e;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <h1>🔧 模组管理中心</h1>

    <!-- 磁贴 -->
    <div class="tiles" id="tilesContainer">
        <!-- 下载 -->
        <div class="tile download" onclick="showPanel('download')">
            <div class="icon">⬇️</div>
            <div>下载</div>
        </div>
        <!-- 加入我们 -->
        <div class="tile join" onclick="showPanel('join')">
            <div class="icon">👥</div>
            <div>加入我们</div>
        </div>
        <!-- 了解我们 → 跳转到正确链接 -->
        <a href="https://andy-star757.github.io/Andy-star757.github.io-know-us/" class="tile about">
            <div class="icon">ℹ️</div>
            <div>了解我们</div>
        </a>
    </div>

    <!-- 下载面板 -->
    <div class="panel" id="downloadPanel">
        <h2>📦 下载模组</h2>
        <p>点击下方按钮前往云盘下载</p>
        <a href="https://1850807544.share.123865.com/123pan/OOZxvd-46c6d" target="_blank" class="btn">🚀 立即下载</a>
        <br>
        <button class="back-btn" onclick="showTiles()">← 返回主页</button>
    </div>

    <!-- 加入我们面板 -->
    <div class="panel" id="joinPanel">
        <h2>💬 加入我们</h2>
        <div class="qq-box">🐧 981913198</div>
        <button class="copy-btn" onclick="copyQQ()">📋 复制群号</button>
        <p id="copyMsg" style="color:#2ecc71; display:none; margin-top:10px;">✅ 已复制！</p>
        <br>
        <button class="back-btn" onclick="showTiles()">← 返回主页</button>
    </div>

    <script>
        function showPanel(type) {
            document.getElementById('tilesContainer').style.display = 'none';
            document.getElementById('downloadPanel').classList.remove('active');
            document.getElementById('joinPanel').classList.remove('active');
            if (type === 'download') document.getElementById('downloadPanel').classList.add('active');
            if (type === 'join') document.getElementById('joinPanel').classList.add('active');
        }

        function showTiles() {
            document.getElementById('tilesContainer').style.display = 'flex';
            document.getElementById('downloadPanel').classList.remove('active');
            document.getElementById('joinPanel').classList.remove('active');
        }

        function copyQQ() {
            navigator.clipboard.writeText('981913198').then(function() {
                document.getElementById('copyMsg').style.display = 'block';
                setTimeout(function() {
                    document.getElementById('copyMsg').style.display = 'none';
                }, 2000);
            });
        }
    </script>

</body>
</html>
