<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>青草工坊 · MC模组下载</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1e3a2f 0%, #2a4a3a 50%, #1a2f24 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #e0f0e8;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      padding: 40px 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 20px;
    }
    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #7fdfb0, #a0ecc8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .subtitle {
      color: #8fbfa8;
      font-size: 0.95rem;
      margin-top: 4px;
    }
    .dino-link {
      background: #3a6650;
      color: #cbe5d8;
      padding: 12px 24px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.25s;
      border: 1px solid #5a8a6a;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .dino-link:hover {
      background: #4d7d60;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 12px 20px rgba(0,0,0,0.3);
    }

    /* 磁贴网格 */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 30px;
      margin-bottom: 30px;
    }

    /* 磁贴卡片 + 翻转动画 */
    .card {
      background: #2c4a3a;
      border-radius: 32px;
      padding: 28px 24px 24px;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), 
                  box-shadow 0.3s;
      border: 1px solid #4a6e58;
      box-shadow: 0 8px 16px rgba(0,0,0,0.25);
      /* 3D 翻转动画 */
      transform-style: preserve-3d;
      perspective: 800px;
    }
    .card:hover {
      transform: translateY(-10px) rotateY(8deg) rotateX(4deg) scale(1.03);
      box-shadow: 0 22px 36px rgba(0,0,0,0.5);
      border-color: #7fbfa0;
    }
    .card:active {
      transform: translateY(-4px) rotateY(2deg) scale(0.98);
      transition: transform 0.1s;
    }
    .card .author-badge {
      display: inline-block;
      background: #4a7a5a;
      color: #d0f0d8;
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .card h3 {
      font-size: 1.6rem;
      margin-bottom: 8px;
      color: #f0f8e8;
    }
    .card .version {
      font-size: 0.9rem;
      color: #a0c8b0;
      margin-bottom: 16px;
    }
    .card p {
      color: #c0dcc8;
      line-height: 1.5;
      margin-bottom: 18px;
    }
    .download-btn {
      background: #4a7a5a;
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 0.9rem;
    }
    .download-btn:hover {
      background: #5fa870;
    }

    /* 加载动画 */
    .loading-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .loading-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #5a9a6a;
      border-top: 6px solid #c8e8d8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      color: #e0f8e8;
      font-size: 1.3rem;
      font-weight: 600;
    }

    footer {
      text-align: center;
      color: #6a8a76;
      margin-top: 30px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <!-- 🏷️ 改名字在这里：第 130 行 -->
      <h1>🌱 MC模组下载</h1>
      <div class="subtitle">中小学生MC模组创作分享站</div>
    </div>
    <a href="/dino" class="dino-link">🦖 等下载？来玩小恐龙</a>
  </div>

  <div class="grid" id="modGrid"></div>
  <footer>📮 所有作品均由同学们自主创作 · 点击卡片下载模组</footer>
</div>

<!-- 加载动画 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">正在跳转到云盘…</div>
</div>

<script>
  // ============================================================
  // 📝 在这里填写你的模组数据（第 155 - 180 行）
  // 每个模组的 cloudUrl 填云盘链接
  // ============================================================
  const mods = [
    // {
    //   name: "模组名称",
    //   author: "作者",
    //   version: "1.20.1",
    //   shortDesc: "简短描述",
    //   cloudUrl: "https://pan.baidu.com/s/xxxx"
    // },
  ];

  const grid = document.getElementById('modGrid');
  const loadingOverlay = document.getElementById('loadingOverlay');

  function renderCards() {
    if (mods.length === 0) {
      grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#a0c8b0;">暂无模组，请联系站长添加</p>';
      return;
    }
    grid.innerHTML = mods.map((mod, index) => `
      <div class="card" data-url="${mod.cloudUrl}">
        <span class="author-badge">👤 ${mod.author}</span>
        <h3>${mod.name}</h3>
        <div class="version">🔖 ${mod.version}</div>
        <p>${mod.shortDesc}</p>
        <button class="download-btn">⬇️ 下载模组</button>
      </div>
    `).join('');
    
    // 绑定下载按钮
    document.querySelectorAll('.download-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation(); // 防止触发卡片的点击
        const url = btn.closest('.card').dataset.url;
        if (!url) return alert('下载链接暂未配置');
        loadingOverlay.classList.add('active');
        setTimeout(() => {
          window.open(url, '_blank');
          loadingOverlay.classList.remove('active');
        }, 1500);
      });
    });
  }

  renderCards();
</script>
</body>
</html>
