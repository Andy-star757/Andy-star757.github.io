<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>青草工坊 · 中小学生MC模组分享</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1e3a2f 0%, #2a4a3a 50%, #1a2f24 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #e0f0e8;
      perspective: 1200px;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      padding: 40px 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 20px;
    }
    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #7fdfb0, #a0ecc8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .subtitle {
      color: #8fbfa8;
      font-size: 0.95rem;
      margin-top: -10px;
    }
    .dino-link {
      background: #3a6650;
      color: #cbe5d8;
      padding: 12px 24px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.25s;
      border: 1px solid #5a8a6a;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .dino-link:hover {
      background: #4d7d60;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 12px 20px rgba(0,0,0,0.3);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 30px;
      margin-bottom: 30px;
    }

    .card {
      background: #2c4a3a;
      border-radius: 32px;
      padding: 28px 24px 24px;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
      border: 1px solid #4a6e58;
      box-shadow: 0 8px 16px rgba(0,0,0,0.25);
      will-change: transform;
    }
    .card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 18px 30px rgba(0,0,0,0.5);
      border-color: #7fbfa0;
    }
    .card .author-badge {
      display: inline-block;
      background: #4a7a5a;
      color: #d0f0d8;
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .card h3 {
      font-size: 1.6rem;
      margin-bottom: 8px;
      color: #f0f8e8;
    }
    .card .version {
      font-size: 0.9rem;
      color: #a0c8b0;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card p {
      color: #c0dcc8;
      line-height: 1.5;
      margin-bottom: 18px;
    }
    .fake-btn {
      background: #4a7a5a;
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 30px;
      font-weight: 600;
      display: inline-block;
      transition: background 0.2s;
    }

    /* 全屏详情覆盖层 */
    .overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(18, 30, 22, 0.95);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .detail-card {
      background: #1e3326;
      max-width: 550px;
      width: 85%;
      padding: 36px 32px;
      border-radius: 48px;
      border: 1px solid #5a8a6a;
      box-shadow: 0 40px 70px rgba(0,0,0,0.7);
      transform: rotateY(90deg) scale(0.7);
      transition: transform 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    .overlay.active .detail-card {
      transform: rotateY(0deg) scale(1);
    }

    .detail-card h2 {
      font-size: 2.2rem;
      color: #e0f8e8;
      margin-bottom: 8px;
    }
    .detail-card .author {
      color: #8fbfa0;
      font-size: 1rem;
      margin-bottom: 12px;
    }
    .detail-card .meta {
      color: #7fa890;
      margin-bottom: 24px;
      font-weight: 500;
    }
    .detail-card .desc {
      color: #c8e8d8;
      line-height: 1.7;
      margin-bottom: 30px;
      font-size: 1.05rem;
    }
    .download-btn {
      background: #5a9a6a;
      border: none;
      color: white;
      font-weight: bold;
      padding: 14px 32px;
      border-radius: 60px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
      margin-right: 12px;
      text-decoration: none;
      display: inline-block;
    }
    .download-btn:hover { background: #6db87a; }
    
    .close-btn {
      background: transparent;
      border: 1px solid #6a8a7a;
      color: #c8e0d0;
      padding: 14px 28px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .close-btn:hover { background: #2a4032; color: white; }

    /* 加载动画覆盖层 */
    .loading-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .loading-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #5a9a6a;
      border-top: 6px solid #c8e8d8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      color: #e0f8e8;
      font-size: 1.3rem;
      font-weight: 600;
    }

    footer {
      text-align: center;
      color: #6a8a76;
      margin-top: 30px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>🌱 青草工坊</h1>
      <div class="subtitle">中小学生MC模组创作分享站 · 每一个创意都值得被看见</div>
    </div>
    <a href="/dino" class="dino-link">🦖 等下载？来玩小恐龙</a>
  </div>

  <!-- 磁贴区域 -->
  <div class="grid" id="modGrid"></div>
  <footer>📮 想投稿你的模组？让老师或家长帮你联系站长吧 · 所有作品均由同学们自主创作</footer>
</div>

<!-- 详情覆盖层 -->
<div class="overlay" id="detailOverlay">
  <div class="detail-card" id="detailCard">
    <h2 id="detailTitle"></h2>
    <div class="author" id="detailAuthor"></div>
    <div class="meta" id="detailVersion"></div>
    <div class="desc" id="detailDesc"></div>
    <button class="download-btn" id="downloadTrigger">⬇️ 下载模组</button>
    <button class="close-btn" id="closeDetailBtn">✕ 关闭</button>
  </div>
</div>

<!-- 加载动画覆盖层 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">正在准备下载链接…</div>
</div>

<script>
  // ============================================================
  // 📝 在这里填写你的模组数据（每个模组是一个对象）
  // 行数：大约 190 - 220 行
  // ============================================================
  const mods = [
    // {
    //   name: "模组名称",
    //   author: "作者署名",
    //   version: "适用版本 · 加载器",
    //   shortDesc: "卡片上的简短描述",
    //   fullDesc: "点击详情后显示的完整介绍",
    //   cloudUrl: "你的云盘链接"   // 例如百度网盘、蓝奏云链接
    // },
    // 复制上面的结构来添加更多模组
  ];

  // ========== 渲染卡片 ==========
  const grid = document.getElementById('modGrid');
  const detailOverlay = document.getElementById('detailOverlay');
  const detailTitle = document.getElementById('detailTitle');
  const detailAuthor = document.getElementById('detailAuthor');
  const detailVersion = document.getElementById('detailVersion');
  const detailDesc = document.getElementById('detailDesc');
  const downloadTrigger = document.getElementById('downloadTrigger');
  const closeDetailBtn = document.getElementById('closeDetailBtn');
  const loadingOverlay = document.getElementById('loadingOverlay');

  let currentCloudUrl = '';

  function renderCards() {
    if (mods.length === 0) {
      grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#a0c8b0;">暂无模组，请联系站长添加</p>';
      return;
    }
    grid.innerHTML = mods.map((mod, index) => `
      <div class="card" data-index="${index}">
        <span class="author-badge">👤 ${mod.author}</span>
        <h3>${mod.name}</h3>
        <div class="version">🔖 ${mod.version}</div>
        <p>${mod.shortDesc}</p>
        <span class="fake-btn">查看详情 & 下载</span>
      </div>
    `).join('');
    
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => {
        const index = card.dataset.index;
        openDetail(mods[index]);
      });
    });
  }

  function openDetail(mod) {
    detailTitle.textContent = mod.name;
    detailAuthor.textContent = `👤 作者：${mod.author}`;
    detailVersion.textContent = `📦 ${mod.version}`;
    detailDesc.textContent = mod.fullDesc;
    currentCloudUrl = mod.cloudUrl;
    detailOverlay.classList.add('active');
  }

  function closeDetail() {
    detailOverlay.classList.remove('active');
  }

  // 下载按钮：显示加载动画，然后跳转云盘
  downloadTrigger.addEventListener('click', () => {
    if (!currentCloudUrl) return alert('下载链接暂未配置');
    // 显示加载动画
    loadingOverlay.classList.add('active');
    // 1.5 秒后跳转到云盘
    setTimeout(() => {
      window.open(currentCloudUrl, '_blank');
      loadingOverlay.classList.remove('active');
    }, 1500);
  });

  closeDetailBtn.addEventListener('click', closeDetail);
  detailOverlay.addEventListener('click', (e) => {
    if (e.target === detailOverlay) closeDetail();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && detailOverlay.classList.contains('active')) closeDetail();
  });

  renderCards();
</script>
</body>
</html>
