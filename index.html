<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模组主页</title>
    <style>
        /* 基础重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, 'Microsoft YaHei', sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            color: #e0e0e0;
        }

        /* 磁贴网格 */
        .tiles {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .tile {
            width: 200px;
            height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            color: white;
            transition: transform 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .tile:hover {
            transform: scale(1.05);
        }

        .tile.download { background: #27ae60; }
        .tile.join { background: #2980b9; }
        .tile.about { background: #c0392b; }

        .tile .icon { font-size: 3rem; margin-bottom: 10px; }
        .tile .label { font-size: 1.2rem; }

        /* 内容面板 */
        .panel {
            display: none;
            background: #16213e;
            border-radius: 12px;
            padding: 40px 30px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .panel.active {
            display: block;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 25px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 25px;
            transition: background 0.2s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .panel h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .panel p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #ccc;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 14px 35px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border: none;
            cursor: pointer;
            margin: 5px;
            transition: all 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .btn-green { background: #27ae60; }
        .btn-blue { background: #2980b9; }

        /* 项目卡片 */
        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 25px 0;
        }
        .card {
            background: #0f3460;
            border-radius: 10px;
            padding: 20px;
            width: 230px;
            text-align: left;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            word-break: break-all;
        }
        .card p {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 12px;
        }
        .card a {
            color: #5dade2;
            text-decoration: none;
            font-weight: bold;
        }
        .card a:hover {
            text-decoration: underline;
        }

        .qq-box {
            background: #0f3460;
            border: 2px dashed #2980b9;
            border-radius: 10px;
            padding: 20px;
            font-size: 2rem;
            font-weight: bold;
            margin: 20px 0;
        }

        .copy-btn {
            padding: 10px 25px;
            background: #34495e;
            border: none;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
        }
        .copy-btn:hover {
            background: #2c3e50;
        }
