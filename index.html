<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MC 模组下载站</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: white;
      position: relative;
      overflow-x: hidden;
    }

    /* 背景装饰 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, rgba(0, 120, 212, 0.15) 0%, transparent 60%),
                  radial-gradient(circle at 70% 60%, rgba(0, 200, 100, 0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* 顶部导航 */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
      position: relative;
      z-index: 10;
      flex-wrap: wrap;
      gap: 15px;
    }

    .site-title {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 20px rgba(79, 172, 254, 0.3);
    }

    .nav-links {
      display: flex;
      gap: 25px;
      align-items: center;
    }

    .nav-links a {
      color: #c8d6e5;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s;
      padding: 8px 12px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .nav-links a:hover {
      color: #4facfe;
      background: rgba(79, 172, 254, 0.1);
    }

    .nav-links a.nav-icon {
      font-size: 1.3rem;
      padding: 6px 10px;
    }

    /* 磁贴容器 */
    .tiles-container {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 25px;
      padding: 40px 20px;
      position: relative;
      z-index: 5;
      max-width: 900px;
      margin: 0 auto;
    }

    /* 磁贴基础样式 */
    .tile {
      width: 180px;
      height: 180px;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-decoration: none;
      color: white;
      font-weight: 700;
      font-size: 1.2rem;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
      perspective: 800px;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    .tile:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.6);
    }

    .tile:active {
      transform: scale(0.92);
      transition: transform 0.15s ease;
    }

    /* 磁贴颜色方案 */
    .tile-download {
      background: linear-gradient(135deg, #0078d4 0%, #005a9e 100%);
    }
    .tile-play {
      background: linear-gradient(135deg, #107c10 0%, #0b5e0b 100%);
    }
    .tile-about {
      background: linear-gradient(135deg, #e67e22 0%, #c0651f 100%);
    }
    .tile-join {
      background: linear-gradient(135deg, #8e44ad 0%, #6c3483 100%);
    }

    /* 磁贴图标和文字 */
    .tile-icon {
      font-size: 3rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .tile-label {
      font-size: 1.1rem;
      letter-spacing: 1px;
    }

    /* 翻转动画（可选） */
    @keyframes flipTile {
      0% { transform: rotateY(0deg); }
      50% { transform: rotateY(90deg); }
      100% { transform: rotateY(0deg); }
    }
    .tile.flip {
      animation: flipTile 0.5s ease;
    }

    /* 响应式 */
    @media (max-width: 600px) {
      .top-bar {
        padding: 15px;
        flex-direction: column;
        align-items: flex-start;
      }
      .site-title {
        font-size: 1.8rem;
      }
      .nav-links {
        gap: 15px;
      }
      .tile {
        width: 140px;
        height: 140px;
        font-size: 1rem;
      }
      .tile-icon {
        font-size: 2.5rem;
      }
    }

    /* 页脚 */
    .footer {
      text-align: center;
      padding: 20px;
      color: #6c7a89;
      font-size: 0.8rem;
      z-index: 5;
    }
  </style>
</head>
<body>

  <!-- 顶部导航 -->
  <div class="top-bar">
    <div class="site-title">⛏️ MC 模组站</div>
    <div class="nav-links">
      <a href="/about/" class="nav-icon" title="关于我们">ℹ️</a>
      <a href="/join/" class="nav-icon" title="加入我们">👥</a>
      <a href="https://github.com/Andy-star757/Andy-star757.github.io" target="_blank" class="nav-icon" title="GitHub 仓库">🐙</a>
    </div>
  </div>

  <!-- 磁贴区域 -->
  <div class="tiles-container">
    <a href="/downloads/" class="tile tile-download" id="tileDownload">
      <span class="tile-icon">⬇️</span>
      <span class="tile-label">下载模组</span>
    </a>

    <a href="/dino/" class="tile tile-play" id="tilePlay">
      <span class="tile-icon">🦖</span>
      <span class="tile-label">玩游戏</span>
    </a>

    <a href="/about/" class="tile tile-about" id="tileAbout">
      <span class="tile-icon">📖</span>
      <span class="tile-label">了解我们</span>
    </a>

    <a href="/join/" class="tile tile-join" id="tileJoin">
      <span class="tile-icon">🤝</span>
      <span class="tile-label">加入我们</span>
    </a>
  </div>

  <!-- 页脚 -->
  <div class="footer">
    Powered by GitHub Pages | © 2026 MC Mods
  </div>

  <script>
    // 磁贴点击翻转动画
    const tiles = document.querySelectorAll('.tile');
    tiles.forEach(tile => {
      tile.addEventListener('click', function(e) {
        // 添加翻转类，动画结束后移除
        this.classList.add('flip');
        setTimeout(() => {
          this.classList.remove('flip');
        }, 500);
        // 不阻止默认跳转行为，所以链接会正常跳转
      });
    });
  </script>
</body>
</html>
