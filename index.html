<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>模组主页 · Metro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            background: #1d1d1d;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .tile-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: center;
            align-items: center;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .tile {
            width: 200px;
            height: 200px;
            background: #2d2d2d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-weight: 500;
            font-size: 1.5rem;
            letter-spacing: 1px;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 16px rgba(0,0,0,0.5);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .tile.download { background: #107c10; }
        .tile.join { background: #0078d4; }
        .tile.about { background: #d83b01; }

        .tile:hover {
            transform: scale(1.04);
            box-shadow: 0 12px 24px rgba(0,0,0,0.6);
            filter: brightness(1.1);
        }
        .tile:active {
            transform: scale(0.97);
            filter: brightness(0.95);
        }

        .tile-icon {
            font-size: 3.5rem;
            margin-bottom: 12px;
            line-height: 1;
            text-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .tile-label {
            font-size: 1.3rem;
            font-weight: 600;
            text-transform: uppercase;
            text-align: center;
        }

        .page-panel {
            display: none;
            width: 100%;
            max-width: 650px;
            background: #2a2a2a;
            border-radius: 8px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            text-align: center;
            animation: fadeSlideIn 0.3s ease;
        }
        .page-panel.active {
            display: block;
        }

        @keyframes fadeSlideIn {
            0% { opacity: 0; transform: translateY(25px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .back-button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.25);
            color: #ffffff;
            font-size: 1rem;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 28px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            font-weight: 500;
        }
        .back-button:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.5);
        }

        .panel-title {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .panel-content {
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 30px;
            color: #e0e0e0;
        }

        .action-button {
            display: inline-block;
            background: #0078d4;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 14px 32px;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(0,120,212,0.4);
            letter-spacing: 0.5px;
            margin: 6px;
        }
        .action-button:hover {
            background: #1084e0;
            box-shadow: 0 6px 18px rgba(0,120,212,0.6);
            transform: translateY(-2px);
        }
        .action-button.green {
            background: #107c10;
            box-shadow: 0 4px 12px rgba(16,124,16,0.4);
        }
