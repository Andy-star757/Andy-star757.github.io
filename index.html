<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模组主页</title>
    <style>
        body {
            background: #1a1a2e;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 2rem;
        }

        .tiles {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .tile {
            width: 200px;
            height: 200px;
            background: red;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
        }

        .tile.download { background: #27ae60; }
        .tile.join { background: #2980b9; }
        .tile.about { background: #c0392b; }

        .tile:hover {
            transform: scale(1.05);
        }

        .icon {
            font-size: 3rem;
        }

        /* 面板默认隐藏 */
        .panel {
            display: none;
            background: #16213e;
            max-width: 600px;
            margin: 20px auto;
            padding: 30px;
            border-radius: 10px;
        }

        .panel.active {
            display: block;
        }

        .back-btn {
            padding: 10px 25px;
            background: #333;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 14px 35px;
            background: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .qq-box {
            background: #0f3460;
            border: 2px dashed #2980b9;
            padding: 20px;
            font-size: 2rem;
            margin: 20px 0;
        }

        .copy-btn {
            padding: 10px 25px;
            background: #34495e;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
        }

        .cards {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .card {
            background: #0f3460;
            padding: 20px;
            border-radius: 10px;
            width: 220px;
        }

        .card a {
            color: #5dade2;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🔧 模组管理中心</h1>

    <!-- ====== 磁贴（始终显示） ====== -->
    <div class="tiles" id="tilesContainer">
        <div class="tile download" onclick="showPanel('download')">
            <div class="icon">⬇️</div>
            <div>下载</div>
        </div>
        <div class="tile join" onclick="showPanel('join')">
            <div class="icon">👥</div>
            <div>加入我们</div>
        </div>
        <div class="tile about" onclick="showPanel('about')">
            <div class="icon">ℹ️</div>
            <div>了解我们</div>
        </div>
    </div>

    <!-- ====== 下载面板 ====== -->
    <div class="panel" id="downloadPanel">
        <button class="back-btn" onclick="showTiles()">← 返回主页</button>
        <h2>📦 下载模组</h2>
        <p>点击下方按钮前往云盘下载</p>
        <a href="https://1850807544.share.123865.com/123pan/OOZxvd-46c6d" target="_blank" class="btn">🚀 立即下载</a>
    </div>

    <!-- ====== 加入我们面板 ====== -->
    <div class="panel" id="joinPanel">
        <button class="back-btn" onclick="showTiles()">← 返回主页</button>
        <h2>💬 加入我们</h2>
        <div class="qq-box">🐧 981913198</div>
        <button class="copy-btn" onclick="copyQQ()">📋 复制群号</button>
        <p id="copyMsg" style="color:#2ecc71; display:none; margin-top:10px;">✅ 已复制！</p>
    </div>

    <!-- ====== 了解我们面板 ====== -->
    <div class="panel" id="aboutPanel">
        <button class="back-btn" onclick="showTiles()">← 返回主页</button>
        <h2>🔍 了解我们</h2>
        <p>两个项目页面：</p>
        <div class="cards">
            <div class="card">
                <h3>📁 主项目</h3>
                <p>Andy-star757.github.io</p>
                <a href="https://andy-star757.github.io" target="_blank">打开 →</a>
            </div>
            <div class="card">
                <h3>📄 了解我们</h3>
                <p>Andy-star757.github.io-know-us</p>
                <a href="https://andy-star757.github.io/Andy-star757.github.io-know-us" target="_blank">打开 →</a>
            </div>
        </div>
    </div>

    <script>
        // 显示面板
        function showPanel(type) {
            // 隐藏磁贴
            document.getElementById('tilesContainer').style.display = 'none';
            // 隐藏所有面板
            document.getElementById('downloadPanel').classList.remove('active');
            document.getElementById('joinPanel').classList.remove('active');
            document.getElementById('aboutPanel').classList.remove('active');
            // 显示对应面板
            if (type === 'download') document.getElementById('downloadPanel').classList.add('active');
            if (type === 'join') document.getElementById('joinPanel').classList.add('active');
            if (type === 'about') document.getElementById('aboutPanel').classList.add('active');
        }

        // 返回磁贴
        function showTiles() {
            document.getElementById('tilesContainer').style.display = 'flex';
            document.getElementById('downloadPanel').classList.remove('active');
            document.getElementById('joinPanel').classList.remove('active');
            document.getElementById('aboutPanel').classList.remove('active');
        }

        // 复制QQ号
        function copyQQ() {
            navigator.clipboard.writeText('981913198').then(function() {
                document.getElementById('copyMsg').style.display = 'block';
                setTimeout(function() {
                    document.getElementById('copyMsg').style.display = 'none';
                }, 2000);
            });
        }
    </script>

</body>
</html>
